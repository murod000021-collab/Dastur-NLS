<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A1D3F">
<title>Internet yo'q — NLS Print</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:linear-gradient(135deg,#071632 0%,#0E2F6B 55%,#1457C4 100%);
    color:#fff;display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;text-align:center;
  }
  .card{max-width:420px;width:100%}
  .logo{
    width:96px;height:96px;border-radius:24px;margin:0 auto 26px;
    background:linear-gradient(135deg,#0a224f,#1457C4);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    box-shadow:0 12px 34px rgba(0,0,0,.4);position:relative;
  }
  .logo b{font-size:34px;font-weight:800;letter-spacing:1px;line-height:1}
  .logo i{display:block;width:54px;height:3px;background:#e03e2e;border-radius:2px;margin:6px auto 4px}
  .logo span{font-size:11px;letter-spacing:5px;color:#cfe0f7;font-style:normal}
  .icon{font-size:54px;margin-bottom:14px}
  h1{font-size:23px;font-weight:700;margin-bottom:12px}
  p{font-size:15px;line-height:1.6;color:#cdd9ee;margin-bottom:8px}
  .note{font-size:13px;color:#9fb4d6;margin-top:14px}
  button{
    margin-top:26px;background:#fff;color:#0E2F6B;border:0;border-radius:14px;
    padding:15px 30px;font-size:16px;font-weight:700;cursor:pointer;width:100%;
    box-shadow:0 8px 22px rgba(0,0,0,.28);transition:transform .12s,opacity .12s;
  }
  button:active{transform:scale(.97);opacity:.9}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#ff5a4d;margin-right:7px;vertical-align:middle}
  .status{margin-top:18px;font-size:13px;color:#9fb4d6}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><b>NLS</b><i></i><span>PRINT</span></div>
    <div class="icon">📡</div>
    <h1>Internet yo'q</h1>
    <p>Qurilmangiz internetga ulanmagan.</p>
    <p><strong>NLS Print onlayn ishlaydi</strong> — ma'lumotlar bulut bilan sinxronlanadi. Iltimos, internetni yoqing va qayta urinib ko'ring.</p>
    <button onclick="retry()"><span class="dot"></span>Qayta urinib ko'rish</button>
    <div class="status" id="st">Ulanish kutilmoqda…</div>
    <div class="note">Wi-Fi yoki mobil internetni tekshiring</div>
  </div>
<script>
  function retry(){ location.reload(); }
  function check(){
    var st=document.getElementById('st');
    if(navigator.onLine){ st.textContent='✅ Internet tiklandi — yuklanmoqda…'; setTimeout(function(){ location.replace('/'); },600); }
    else { st.textContent='⚠️ Hali ulanish yo’q'; }
  }
  window.addEventListener('online', check);
  setInterval(check, 3000);
  check();
</script>
</body>
</html>
